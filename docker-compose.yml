# ⚠️  DEVELOPMENT ONLY — DO NOT use in production.
# For production deployments, use infra/docker-compose.prod.yml instead.
version: '3.9'

services:

  # ── Helm Hub (Python/FastAPI AI backend) ──────────────────
  helm-hub:
    build:
      context: ./helm-hub
      dockerfile: docker/Dockerfile
    container_name: helm-hub
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - ./helm-hub:/app
      - helm_workspace:/app/workspace
      - helm_workspaces:/app/workspaces
    networks:
      - helm-network
    restart: unless-stopped

  # ── REIFundamentals Hub (React SPA via Nginx) ─────────────
  rei-hub:
    build:
      context: ./rei-hub
      dockerfile: Dockerfile
    container_name: rei-hub
    ports:
      - "3000:80"
    networks:
      - helm-network
    restart: unless-stopped
    depends_on:
      - helm-hub

volumes:
  helm_workspace:
  helm_workspaces:

networks:
  helm-network:
    driver: bridge