worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Upstreams ────────────────────────────────────────────
    upstream rei_backend {
        server rei-hub-backend:8001;
    }

    upstream rei_frontend {
        server rei-hub-frontend:80;
    }

    # ── REI Hub — HTTP → HTTPS redirect ─────────────────────
    server {
        listen 80;
        server_name reifundamentalshub.com www.reifundamentalshub.com;
        return 301 https://$host$request_uri;
    }

    # ── REI Hub — HTTPS ─────────────────────────────────────
    server {
        listen 443 ssl;
        server_name reifundamentalshub.com www.reifundamentalshub.com;

        # SSL — uncomment after certbot provisioning
        # ssl_certificate     /etc/nginx/ssl/reifundamentalshub.com/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/reifundamentalshub.com/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        location /api/ {
            proxy_pass         http://rei_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://rei_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
